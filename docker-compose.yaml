services:
  postgres:
    image: postgres:16-alpine
    container_name: forum-postgres
    environment:
      POSTGRES_DB: ${FORUM_DEV_DB_NAME:-forum}
      POSTGRES_USER: ${FORUM_DEV_DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${FORUM_DEV_DB_PASSWORD:-admin}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FORUM_DEV_DB_USERNAME:-admin} -d ${FORUM_DEV_DB_NAME:-forum}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: forum-adminer
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy

  forum-local:
    build:
      context: .
    container_name: forum-local
    env_file:
      - .env.local
    environment:
      FORUM_DEV_DB_URL: jdbc:postgresql://forum-postgres:5432/forum
      FORUM_DEV_DB_USERNAME: ${FORUM_DEV_DB_USERNAME:-admin}
      FORUM_DEV_DB_PASSWORD: ${FORUM_DEV_DB_PASSWORD:-admin}
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

  forum-ui:
    image: forum-ui
    container_name: forum-ui
    environment:
      BACKEND_UPSTREAM: http://forum-local:9000
    ports:
      - "2233:80"
    depends_on:
      forum-local:
        condition: service_healthy
